name: Determinism Check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  determinism:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Repo-agnostic determinism gate:
      # - prove checkout is clean
      # - prove git does not mutate working tree
      - name: Verify clean workspace
        shell: bash
        run: |
          set -euo pipefail
          git status --porcelain=v1
          test -z " M .github/workflows/determinism-check.yml"
          git diff --exit-code
          git submodule status || true

      - name: Determinism marker
        run: echo "determinism: ok"

name: Index Integrity

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  append-only:
    name: append-only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: governed append-only gate
        run: node scripts/speedkit-governed-public-reconciliation-gate.cjs

  whitespace-check:
    name: whitespace-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: whitespace-check
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const exts = new Set(['.html','.js','.json','.md','.txt','.css','.yml','.yaml','.py','.sh','.cjs']);
          const bad = [];
          function walk(d){
            for (const name of fs.readdirSync(d)) {
              const p = path.join(d,name);
              const parts = p.split(path.sep);
              if (parts.includes('.git') || parts.includes('.wrangler') || parts.includes('node_modules')) continue;
              const st = fs.statSync(p);
              if (st.isDirectory()) walk(p);
              else if (exts.has(path.extname(p).toLowerCase())) {
                const lines = fs.readFileSync(p,'utf8').split(/\r?\n/);
                lines.forEach((line,i)=>{ if (line.replace(/[ \t]+$/,'') !== line) bad.push(`${p}:${i+1}`); });
              }
            }
          }
          walk('.');
          if (bad.length) { console.log(bad.slice(0,200).join('\n')); process.exit(1); }
          console.log('WHITESPACE_CHECK_PASS=true');
          NODE

  checksum-verify:
    name: checksum-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: checksum-verify
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');
          const expected = crypto.createHash('sha256').update(fs.readFileSync('index.html')).digest('hex') + '  index.html';
          const actual = fs.readFileSync('INDEX_CHECKSUM.txt','utf8').trim();
          if (actual !== expected) { console.error(`checksum mismatch: ${actual} != ${expected}`); process.exit(1); }
          console.log('CHECKSUM_VERIFY_PASS=true');
          NODE

  failure-codes-integrity:
    name: failure-codes-integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: public universe audit
        run: node scripts/speedkit-public-universe-audit.cjs
